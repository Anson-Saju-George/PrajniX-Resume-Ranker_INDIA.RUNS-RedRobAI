ai_usage_summary: >
  Claude, ChatGPT, and OpenAI Codex CLI were used for design discussion, code
  generation, debugging assistance, documentation, and review. All ranking
  logic is deterministic and human-reviewed; no AI model or external API runs
  in the judged ranking pipeline.

methodology_summary: >
  TalentGate AI ranks 100,000 candidates against one JD under a CPU-only, no-network,
  sub-5-minute budget. A deterministic integrity shield runs first, suppressing honeypots
  and impossible profiles (reversed salary, active-before-signup, expert-skill-zero-months,
  future certifications, title-vs-skill incoherence) — validated against dataset-wide
  contradiction counts. Recall is dual-channel: a structured-fit pass over all candidates
  unioned with lexical/dense retrieval (RRF), so plain-language strong candidates are not
  lost to templated text. Scoring is gates-vs-compensatory with asymmetric experience-band
  fit (ideal 6-8; over-band penalized) and behavioral-availability down-weighting, keying on
  cross-field coherence rather than keywords. Reasoning is template-generated from real
  fields only (zero hallucination). The dataset is unlabeled, so weights were tuned on a
  hand-judged, stratified 80-row validation set using judged-only NDCG@10/@50, MAP, P@10.
  Final run: ~30s, CPU-only, deterministic, 0% honeypot rate in the top 100.

