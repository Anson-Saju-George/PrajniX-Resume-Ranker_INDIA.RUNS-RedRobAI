default_variant: D_overband_mild_avail_heavy
description: "Locked Phase 5C configuration: dual-channel recall, mild over-band curve, heavy availability penalties."

variants:
  B:
    recall_mode: B_score_everyone
    penalty_strength: light
  A:
    recall_mode: A_retrieval_first
    penalty_strength: light
  D:
    recall_mode: D_dual_channel
    penalty_strength: light
    experience_profile: base
  D_base:
    recall_mode: D_dual_channel
    penalty_strength: light
    experience_profile: base
  D_overband_mild:
    recall_mode: D_dual_channel
    penalty_strength: light
    experience_profile: overband_mild
  D_overband_strong:
    recall_mode: D_dual_channel
    penalty_strength: light
    experience_profile: overband_strong
  D_avail_light:
    recall_mode: D_dual_channel
    penalty_strength: light
    experience_profile: base
  D_avail_heavy:
    recall_mode: D_dual_channel
    penalty_strength: heavy
    experience_profile: base
  D_overband_strong_avail_heavy:
    recall_mode: D_dual_channel
    penalty_strength: heavy
    experience_profile: overband_strong
  D_overband_mild_avail_heavy:
    recall_mode: D_dual_channel
    penalty_strength: heavy
    experience_profile: overband_mild

recall:
  artifact_dir: data/recall
  rrf_k: 60
  A_retrieval_first:
    text_shortlist_size: 10000
  D_dual_channel:
    text_shortlist_size: 10000
    structured_shortlist_size: 10000

jd_policy:
  hard_gates_from_integrity:
    - expert_skill_zero_months
    - future_dated_certification
    - multiple_severe_contradictions
    - keyword_stuffer
    - consulting_only_trajectory
    - pure_research_without_production
    - no_recent_production_code
  must_haves:
    - production_embeddings_retrieval
    - vector_or_hybrid_search
    - python
    - ranking_evaluation_frameworks
  nice_to_haves:
    - llm_fine_tuning
    - learning_to_rank
    - hrtech_or_marketplace
    - distributed_systems_or_inference
    - open_source_ai_ml
  soft_negatives:
    cv_speech_robotics_without_nlp_ir: "low retrieval/career evidence; no title-only penalty"
    title_chasing: "not inferred without defensible title-progression evidence"
    closed_source_only_without_external_validation: "not inferred from missing profile URLs"
    behavioral_unavailability: "behavioral availability aspect plus Phase 1 penalties"

# Frozen from docs/PRD.md section 4b. Values sum to 1.0.
aspect_weights:
  skills: 0.30
  career: 0.15
  production: 0.25
  experience: 0.10
  availability: 0.12
  integrity: 0.08

# Only over-qualified bands change across profiles. Under-qualified fits retain
# the frozen asymmetric curve from experience_features.py.
experience_profiles:
  base:
    slightly_over: 0.90
    over: 0.78
    well_over: 0.65
  overband_mild:
    slightly_over: 0.75
    over: 0.52
    well_over: 0.30
  overband_strong:
    slightly_over: 0.60
    over: 0.32
    well_over: 0.10

# Phase 1 soft flags are multiplicative confidence penalties, never removals.
penalty_profiles:
  light:
    salary_range_reversed: 0.98
    last_active_before_signup: 0.95
    skill_duration_impossible: 0.90
    long_notice_period: 0.95
    long_notice_period_severe: 0.88
    low_recruiter_response_rate: 0.90
    low_profile_completeness: 0.92
    not_open_to_work: 1.00
    stale_last_active: 1.00
  heavy:
    # Availability-specific factors are stronger; unrelated integrity factors
    # stay frozen so this experiment isolates knob 3.
    salary_range_reversed: 0.98
    last_active_before_signup: 0.95
    skill_duration_impossible: 0.90
    long_notice_period: 0.88
    long_notice_period_severe: 0.70
    low_recruiter_response_rate: 0.75
    low_profile_completeness: 0.92
    not_open_to_work: 0.75
    stale_last_active: 0.80

reference_date: "2026-06-01"
top_k: 100
score_decimals: 8
