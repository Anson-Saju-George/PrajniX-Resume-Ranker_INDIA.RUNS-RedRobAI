ai_usage_summary: |
  Claude, ChatGPT, and Codex were used for design discussion, code generation,
  debugging assistance, documentation, and review. All ranking logic is
  deterministic and human-reviewed. No AI model or external API runs in the
  judged ranking pipeline; reasoning is generated from fixed evidence templates.

methodology_summary: |
  Deterministic, JD-aware ranking over 100,000 schema-validated candidate
  profiles. An integrity shield suppresses severe contradictions before a
  dual-channel recall stage unions structured fit over the full pool with
  field-weighted BM25 and precomputed dense-vector retrieval. The union is
  scored on corroborated skills, career and production evidence, asymmetric
  experience-band fit, behavioral availability, and integrity confidence.
  Missing sentinels remain neutral. Heavy availability penalties down-weight
  not-open, stale, low-response, and long-notice candidates. Output reasoning
  is template-generated from observed fields. The unlabeled dataset was tuned
  directionally using a blind 80-row, 10-slice human judge set and judged-only
  NDCG@10/NDCG@50/MAP/P@10, with targeted top-10 probes used as the final
  tiebreaker. Ranking is CPU-only, network-free, and takes approximately 29
  seconds using precomputed local retrieval artifacts.

locked_configuration:
  recall_mode: "D_dual_channel"
  scoring_variant: "D_overband_mild_avail_heavy"
  experience_profile: "overband_mild"
  penalty_profile: "heavy"

